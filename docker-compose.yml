version: "3.7"

services:
  app:
    build: .
    container_name: FleetFlow_app
    depends_on:
      - db
    ports:
      - 8080:8080
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/fleetflow
      SPRING_DATASOURCE_USERNAME: fleetuser
      SPRING_DATASOURCE_PASSWORD: password
    networks:
      - app_network

  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    ports:
      - 3308:3306
    networks:
      - app_network
    environment:
      MYSQL_DATABASE: fleetflow
      MYSQL_USER: fleetuser
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: anyrootpassword
    volumes:
      - db_data:/var/lib/mysql

networks:
  app_network:

volumes:
  db_data: